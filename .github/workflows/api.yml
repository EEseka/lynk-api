name: Lynk API Pipeline

# THE TRIGGER
on:
  push:
    branches: [ "**" ] # Runs on every single push to any branch
  pull_request:
    branches: [ "main" ] # Runs when I try to merge into main

# THE ENVIRONMENT
jobs:
  build:
    name: Build and Test API
    runs-on: ubuntu-latest

    # THE INSTRUCTIONS
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and Run Tests
        run: ./gradlew build